services:
  postgres:
    image: postgres:16-alpine
    container_name: riftborn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: riftborn_dev
      POSTGRES_USER: riftborn
      POSTGRES_PASSWORD: riftborn_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U riftborn -d riftborn_dev']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: riftborn_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass riftborn_redis_password
      --save 60 1
      --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'riftborn_redis_password', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
